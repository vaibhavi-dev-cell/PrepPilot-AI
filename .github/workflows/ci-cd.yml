name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Type check with mypy
        working-directory: ./backend
        run: |
          pip install mypy
          mypy app --ignore-missing-imports || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build
        working-directory: ./frontend
        run: npm run build
      
      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker images
        run: |
          docker build -t preppilot-backend:latest ./backend
          docker build -t preppilot-frontend:latest ./frontend
      
      - name: Push to registry (if configured)
        # Add your Docker registry credentials and push commands here
        run: echo "Configure Docker registry in your GitHub Secrets"

      - name: Deploy to production
        # Add your deployment configuration here
        # Example: Deploy to Render, Vercel, or your hosting platform
        run: echo "Configure deployment in your GitHub Actions workflow"
